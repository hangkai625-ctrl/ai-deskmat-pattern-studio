services:
  - type: web
    name: ai-deskmat-pattern-studio
    env: node
    plan: free
    buildCommand: ""
    startCommand: "node server.mjs"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: IMAGE_API_URL
        value: https://api.mooko.ai/v1/images/generations
      - key: IMAGE_EDIT_API_URL
        value: https://api.mooko.ai/v1/images/edits
      - key: IMAGE_MODEL
        value: gpt-image-2-pro
      - key: IMAGE_SIZE
        value: 2048x1152
      - key: IMAGE_QUALITY
        value: high
      - key: IMAGE_MODERATION
        value: auto
      - key: IMAGE_RESPONSE_FORMAT
        value: b64_json
